<!DOCTYPE html>
<html>
<head>
    <title>Glow AI Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>✨ Create Your Glow Profile</h1>

<p>Tell us about yourself to get personalized recommendations.</p>

<label>Name</label>
<input type="text" id="name" placeholder="Enter your name">


<label>Skin Type</label>
<select id="skinType">
    <option>Dry</option>
    <option>Oily</option>
    <option>Combination</option>
    <option>Sensitive</option>
</select>


<label>Main Concern</label>
<select id="concern">
    <option>Acne</option>
    <option>Dryness</option>
    <option>Dark Spots</option>
    <option>None</option>
</select>


<button onclick="generateGlow()">
Generate My Glow Plan ✨
</button>

</div>


<script src="script.js"></script>

</body>
</html>
